version: '3.8'

services:
  store-db:
    image: mysql:8.0
    container_name: store_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: store
      MYSQL_USER: store_user
      MYSQL_PASSWORD: store_password
    ports:
      - "3306:3306"
    volumes:
      - store_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "store_user", "-pstore_password"]
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  store_mysql_data:
    driver: local
